server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: authesystem1
  datasource:
    url: ${DB_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:authdatabase}}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:vikas@narnix}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${REDIS_HOST:redis-18075.c251.east-us-mz.azure.cloud.redislabs.com}
      port: ${REDIS_PORT:18075}
      username: ${REDIS_USERNAME:default}
      password: ${REDIS_PASSWORD:Lif97nlhCcKahMbK5rEVWqvIcdKoF4qq}
      timeout: 3s
      ssl:
        enabled: ${REDIS_SSL_ENABLED:false}
  cache:
    type: redis
app:
  jwt:
    secret: ${JWT_SECRET:VGhpc0lzQVN1cGVyU2VjdXJlSldUU2VjcmV0S2V5Rm9yU3ByaW5nQm9vdA==}
    issuer: ${JWT_ISSUER:authesystem1}
    access-token-minutes: ${JWT_ACCESS_TOKEN_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_TOKEN_DAYS:30}
  rate-limit:
    login:
      max-attempts-per-minute: ${LOGIN_RATE_LIMIT_PER_MINUTE:10}
      window-seconds: ${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}

logging:
  level:
    root: INFO
    com.vikas.authsystem: INFO
